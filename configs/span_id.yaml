# Span identification config - all paths and hyperparameters config-driven
# Layout: data/span_id/<domain>/

# Base paths (relative to project root)
data_dir: "data"
span_id_dir: "data/span_id"
processed_dir: "data/processed"
checkpoint_dir: "data/checkpoints"
research_dir: "data/research"
log_dir: "data/logs"

# Under span_id_dir: data/span_id/<domain>/splits/
splits_subdir: "splits"

# Processed input (from ground_truth pipeline)
processed:
  paragraphs_file: "paragraphs_{domain}.jsonl"
  sentences_file: "sentences_{domain}.jsonl"
  articles_file: "articles_page_granularity_{domain}.jsonl"

# Split config
split:
  seed: 42
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  split_by: "article_id"
  recreate_if_exists: false

# Sweep dimensions
domains: ["money-heist"]
granularities: ["sentence", "paragraph", "article"]
models: ["bert-base-uncased"]
label_schemes: ["BIO", "BILOU"]

# Training hyperparameters
training:
  epochs: 20
  learning_rate: 5.0e-5
  batch_size: 32
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0

optimizer: "adamw"
scheduler: "linear"

early_stopping:
  enabled: true
  patience: 3
  min_delta: 0.001
  metric: "val_span_f1"

model:
  max_length: 512
  dropout: 0.1

# Reproducibility
seeds: [42, 123, 456]
fix_random_seeds: true

# Checkpointing
checkpoint:
  save_every_epoch: true
  selection: ["best_val_f1", "last"]

# Baselines
run_baselines: true
baselines: ["rule_capitalized", "heuristic_anchor", "random"]

# Data fractions (for learning curves, 1.0 = full data)
data_fractions: [1.0]

# Cross-domain transfer
transfer_experiments: false

# Evaluation metrics
metrics: ["span_f1", "token_f1", "exact_match_pct", "overlap_f1"]

# Research CSV
research_csv: "span_id_experiments.csv"
