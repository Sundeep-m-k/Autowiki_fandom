# Span identification config — general / multi-domain sweep.
# Inherits all defaults from span_id_base.yaml and overrides only what differs.
base: "span_id_base.yaml"

domains: ["money-heist"]

# 6-model sweep. Note: Longformer supports up to 4096 tokens but runs fine at
# max_length: 512 for sentence/paragraph granularities. If you want to exploit
# its long-context capacity for article-level inputs, set max_length: 4096 here
# and reduce batch_size accordingly (memory scales with sequence length).
models:
  - "bert-base-uncased"
  - "microsoft/deberta-v3-base"
  - "SpanBERT/spanbert-base-cased"
  - "roberta-base"
  - "distilbert-base-uncased"
