# Wikipedia ground truth config
# Processes Wikipedia XML dump (chunk 1) into the same JSONL schema as Fandom domains.

domain: "wikipedia"

# Path to the downloaded Wikipedia XML dump (relative to project root)
dump_path: "data/raw/wikipedia/enwiki-latest-pages-articles1.xml-p1p41242.bz2"

processed_dir: "data/processed"

# Set to 0 for all articles in the dump, or a positive integer to limit
# (useful for quick prototyping — 500 gives a good sample in ~2 minutes)
max_articles: 0

min_paragraph_chars: 30

outputs:
  paragraphs_jsonl: true
  sentences_jsonl: true
  articles_page_granularity_jsonl: true
  articles_index_jsonl: true
  paragraphs_csv: true
  paragraph_links_csv: true
  sentences_csv: false
  sentence_links_csv: false
