# Span identification — Kudremukh (4× RTX 6000 Ada).
# Run: python scripts/02_Span_identification/01_run_span_id_kudremukh.py
# Uses all 4 GPUs for ~2.5–4× faster training via HF Trainer's accelerate integration.
# Inherits all defaults from span_id_base.yaml and overrides only what differs.
base: "base.yaml"

domains: ["money-heist"]

models:
  - "bert-base-uncased"
  - "microsoft/deberta-v3-base"
  - "roberta-base"
  - "distilbert-base-uncased"
