name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest pyyaml
      - run: pip install torch transformers --index-url https://download.pytorch.org/whl/cpu 2>/dev/null || pip install torch transformers
      - run: PYTHONPATH=. python -m pytest tests/span_identification/ tests/integration/ -v
